schema_version: 1
module:
  name: nsx-peripherals
  type: backend_specific
  version: 0.1.1
support:
  ambiqsuite: true
  zephyr: false
summary: >-
  Common peripheral-access helpers for board devices and attached hardware
  resources.
capabilities:
  - peripherals
  - device_access
  - board_io
use_cases:
  - board peripheral bring-up
  - attached device access in smoke tests
  - reusable peripheral helpers outside a single bus wrapper
agent_keywords:
  - peripherals
  - devices
  - board io
  - hardware access
build:
  cmake:
    package: nsx_peripherals
    targets:
      - nsx::peripherals
depends:
  required:
    - nsx-core
    - nsx-harness
    - nsx-utils
    - nsx-soc-hal
  optional: []
compatibility:
  boards:
    - '*'
  socs:
    - apollo3
    - apollo3p
    - apollo4l
    - apollo4p
    - apollo5b
    - apollo510
    - apollo510b
    - apollo330P
  toolchains:
    - arm-none-eabi-gcc
